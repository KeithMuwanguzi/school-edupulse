<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkulPulse Admin — Platform</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

  <div class="app-shell admin-shell">
    <aside class="sidebar admin-sidebar">
      <div class="sidebar-brand">
        <div class="logo-mark">S</div>
        <span>SkulPulse <span class="text-xs text-muted" style="font-weight:450">Admin</span></span>
      </div>

      <nav class="sidebar-nav" id="admin-nav">
        <div class="nav-group" data-nav-group="primary">
          <div class="nav-group-items">
            <button class="nav-item active" data-screen="dashboard"><span class="nav-icon" data-icon="dashboard"></span><span>Dashboard</span></button>
            <button class="nav-item" data-screen="schools"><span class="nav-icon" data-icon="schools"></span><span>Schools</span></button>
            <button class="nav-item" data-screen="onboard"><span class="nav-icon" data-icon="admissions"></span><span>Onboard school</span></button>
            <button class="nav-item" data-screen="billing"><span class="nav-icon" data-icon="billing"></span><span>Billing</span></button>
          </div>
        </div>
        <div class="nav-group collapsed" data-nav-group="system">
          <button type="button" class="nav-group-toggle" data-nav-group-toggle="system">
            <span>System</span>
            <span class="chevron icon"></span>
          </button>
          <div class="nav-group-items">
            <button class="nav-item" data-screen="catalog"><span class="nav-icon" data-icon="modules"></span><span>Module catalog</span></button>
            <button class="nav-item" data-screen="audit"><span class="nav-icon" data-icon="audit"></span><span>Audit log</span></button>
            <button class="nav-item" data-screen="settings"><span class="nav-icon" data-icon="settings"></span><span>Settings</span></button>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user-compact">
          <div class="avatar">P</div>
          <div style="min-width:0">
            <div class="sidebar-user-name">Platform Admin</div>
            <div class="sidebar-user-role">SkulPulse Uganda</div>
          </div>
        </div>
        <a href="../prototype.html" class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.625rem">Open school demo</a>
      </div>
    </aside>

    <div class="main-content">
      <div class="demo-banner admin-banner">
        Platform admin · shared store with school portal · <a href="../index.html">Overview</a>
      </div>

      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" aria-label="Menu"></button>
          <div class="breadcrumb" id="admin-breadcrumb"><strong>Dashboard</strong></div>
        </div>
        <div class="topbar-right">
          <a href="../prototype.html" class="btn btn-ghost btn-sm">School portal</a>
        </div>
      </header>

      <main class="page-content">
        <div id="admin-screen"></div>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="admin-modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <h3 id="admin-modal-title">Details</h3>
        <button class="modal-close" id="admin-modal-close">&times;</button>
      </div>
      <div class="modal-body" id="admin-modal-body"></div>
      <div class="modal-footer" id="admin-modal-footer">
        <button class="btn btn-secondary btn-sm" id="admin-modal-dismiss">Close</button>
      </div>
    </div>
  </div>

  <div id="admin-toast-container" class="toast-container"></div>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/charts.js"></script>
  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/store.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin-app.js"></script>
  <script>
    document.querySelectorAll('[data-icon]').forEach(el => {
      el.innerHTML = Icons[el.dataset.icon] || '';
    });
    document.querySelector('.sidebar-toggle').innerHTML = Icons.menu || '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M2 4h12M2 8h12M2 12h12"/></svg>';
    document.querySelector('.nav-group-toggle .chevron').innerHTML = Icons.chevron || '';
    AdminApp.init();
  </script>
</body>
</html>
